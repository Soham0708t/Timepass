<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friend Ranking</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #191919;
  --surface3: #222222;
  --border: #2a2a2a;
  --border2: #333333;
  --gold: #c9a84c;
  --gold2: #e8cc80;
  --gold3: #f5e4a8;
  --cream: #ede8e0;
  --muted: #555555;
  --muted2: #777777;
  --danger: #c05040;
}

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  padding: 48px 20px 100px;
  background-image:
    radial-gradient(ellipse 60% 40% at 15% 10%, rgba(201,168,76,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 85% 90%, rgba(100,80,180,0.03) 0%, transparent 70%);
}

header {
  text-align: center;
  margin-bottom: 52px;
  animation: fadeDown 0.7s cubic-bezier(.16,1,.3,1) both;
}

.header-eyebrow {
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
  opacity: 0.8;
}

header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 8vw, 5.5rem);
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 0.95;
  color: var(--cream);
}

header h1 span {
  background: linear-gradient(135deg, var(--gold3), var(--gold), #a07828);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

header p {
  color: var(--muted2);
  margin-top: 14px;
  font-size: 0.78rem;
  letter-spacing: 0.1em;
  font-weight: 400;
  text-transform: uppercase;
}

.container { max-width: 540px; margin: 0 auto; }

.add-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 36px;
  animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) 0.1s both;
}

.section-label {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 18px;
  opacity: 0.7;
  font-weight: 600;
}

.add-row { display: flex; gap: 10px; align-items: center; }

.avatar-picker { position: relative; flex-shrink: 0; }

.avatar-preview {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 1.5px dashed var(--border2);
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
  font-size: 20px; color: var(--muted);
}
.avatar-preview:hover { border-color: var(--gold); transform: scale(1.05); }
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
#photo-input { display: none; }

.name-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 15px 18px;
  color: var(--cream);
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.name-input::placeholder { color: var(--muted); }
.name-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.08); }

.add-btn {
  background: var(--gold); color: #0a0800;
  border: none; border-radius: 12px;
  padding: 15px 22px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
  cursor: pointer; white-space: nowrap; letter-spacing: 0.05em; text-transform: uppercase;
  transition: background 0.2s, transform 0.15s;
}
.add-btn:hover { background: var(--gold2); }
.add-btn:active { transform: scale(0.96); }

.list-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; padding: 0 2px;
  animation: fadeUp 0.5s ease 0.2s both;
}
.list-header .section-label { margin-bottom: 0; }

.count-badge {
  background: var(--surface2); color: var(--muted2);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 4px 14px; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.05em;
}

.friend-list { display: flex; flex-direction: column; gap: 6px; animation: fadeUp 0.5s ease 0.25s both; }

.friend-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  cursor: grab;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  user-select: none; position: relative;
}
.friend-card:hover { border-color: var(--border2); background: var(--surface2); }
.friend-card.dragging { opacity: 0.35; cursor: grabbing; }
.friend-card.drag-over {
  border-color: var(--gold); background: #181408;
  box-shadow: 0 0 0 2px rgba(201,168,76,0.12);
}

.rank-badge {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
}
.rank-1 { background: linear-gradient(135deg,#d4a840,#f0cc60); color:#0a0800; box-shadow:0 0 14px rgba(201,168,76,0.35); }
.rank-2 { background: linear-gradient(135deg,#7a90a4,#b0c4d4); color:#0a1018; }
.rank-3 { background: linear-gradient(135deg,#9a5828,#c87840); color:#0a0800; }
.rank-other { background: var(--surface3); color: var(--muted2); border: 1px solid var(--border2); font-size: 0.75rem; }

.friend-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--surface3);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; overflow: hidden; flex-shrink: 0;
  border: 1.5px solid var(--border2);
  font-weight: 700; color: var(--gold);
  font-family: 'Cormorant Garamond', serif;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}
.friend-card:hover .friend-avatar { border-color: var(--gold); transform: scale(1.05); }
.friend-avatar img { width: 100%; height: 100%; object-fit: cover; }

.friend-info { flex: 1; min-width: 0; cursor: pointer; }

.friend-name {
  font-size: 0.95rem; font-weight: 600; color: var(--cream);
  letter-spacing: 0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.friend-desc-preview {
  font-size: 0.72rem; color: var(--muted2); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-weight: 400; font-style: italic;
}

.drag-handle {
  color: var(--muted); opacity: 0; transition: opacity 0.2s;
  display: flex; flex-direction: column; gap: 3.5px; padding: 4px 2px; flex-shrink: 0;
}
.friend-card:hover .drag-handle { opacity: 1; }
.drag-handle span { display: block; width: 16px; height: 1.5px; background: currentColor; border-radius: 2px; }

.delete-btn {
  background: none; border: none; color: var(--muted);
  cursor: pointer; padding: 6px; border-radius: 8px;
  font-size: 13px; opacity: 0; flex-shrink: 0;
  transition: opacity 0.2s, color 0.2s, background 0.2s;
}
.friend-card:hover .delete-btn { opacity: 1; }
.delete-btn:hover { color: var(--danger); background: rgba(192,80,64,0.1); }

.empty-state {
  text-align: center; padding: 56px 24px; color: var(--muted);
  border: 1px dashed var(--border2); border-radius: 20px;
  animation: fadeUp 0.5s ease 0.3s both;
}
.empty-state .emoji { font-size: 2.8rem; margin-bottom: 14px; display: block; }
.empty-state p { font-size: 0.85rem; line-height: 1.7; color: var(--muted2); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82); backdrop-filter: blur(8px);
  z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 24px; width: 100%; max-width: 420px; overflow: hidden;
  transform: translateY(24px) scale(0.97);
  transition: transform 0.3s cubic-bezier(.16,1,.3,1);
  box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
}
.modal-overlay.open .modal { transform: translateY(0) scale(1); }

.modal-hero {
  position: relative; height: 130px;
  background: linear-gradient(135deg,#151208,#1a1810);
  display: flex; align-items: flex-end; padding: 0 28px 0;
  border-bottom: 1px solid var(--border); overflow: hidden;
}
.modal-hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(201,168,76,0.07) 0%, transparent 70%);
}

.modal-rank-label {
  position: absolute; top: 16px; right: 20px;
  font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold); opacity: 0.7; font-weight: 600;
}

.modal-avatar-wrap { position: relative; margin-bottom: -28px; z-index: 2; }

.modal-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--surface3); border: 3px solid var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; overflow: hidden; cursor: pointer;
  font-weight: 700; color: var(--gold); font-family: 'Cormorant Garamond', serif;
  transition: transform 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.modal-avatar:hover { transform: scale(1.05); }
.modal-avatar img { width: 100%; height: 100%; object-fit: cover; }
#modal-photo-input { display: none; }

.modal-avatar-hint {
  position: absolute; bottom: -4px; right: -4px;
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--gold); border: 2px solid var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #0a0800; pointer-events: none;
}

.modal-body { padding: 40px 28px 28px; }

.modal-name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }

.modal-name-input {
  flex: 1;
  background: transparent; border: none;
  border-bottom: 1px solid var(--border2);
  color: var(--cream); font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem; font-weight: 700; outline: none;
  padding: 4px 0 8px; letter-spacing: -0.5px;
  transition: border-color 0.2s; width: 100%;
}
.modal-name-input:focus { border-color: var(--gold); }

.modal-rank-badge {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 1rem; flex-shrink: 0;
}

.desc-label {
  font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--gold); opacity: 0.6; font-weight: 600; margin-bottom: 10px; display: block;
}

.desc-textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px; color: var(--cream);
  font-family: 'Syne', sans-serif; font-size: 0.85rem; line-height: 1.6;
  outline: none; resize: none; min-height: 100px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.desc-textarea::placeholder { color: var(--muted); font-style: italic; }
.desc-textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.07); }

.modal-footer { display: flex; gap: 10px; margin-top: 20px; }

.btn-save {
  flex: 1; background: var(--gold); color: #0a0800;
  border: none; border-radius: 12px; padding: 14px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
  cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase;
  transition: background 0.2s, transform 0.15s;
}
.btn-save:hover { background: var(--gold2); }
.btn-save:active { transform: scale(0.97); }

.btn-cancel {
  background: var(--surface2); color: var(--muted2);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 20px; font-family: 'Syne', sans-serif;
  font-weight: 600; font-size: 0.8rem; cursor: pointer;
  letter-spacing: 0.05em; text-transform: uppercase;
  transition: background 0.2s, color 0.2s;
}
.btn-cancel:hover { background: var(--surface3); color: var(--cream); }

@keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes cardIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-eyebrow">Personal</div>
    <h1>Friend <span>Ranking</span></h1>
    <p>Click a profile to edit · Drag to reorder</p>
  </header>

  <div class="add-section">
    <div class="section-label">Add Friend</div>
    <div class="add-row">
      <div class="avatar-picker">
        <div class="avatar-preview" id="avatar-preview" onclick="document.getElementById('photo-input').click()" title="Add photo">📷</div>
        <input type="file" id="photo-input" accept="image/*" onchange="handlePhoto(event)">
      </div>
      <input class="name-input" id="name-input" type="text" placeholder="Enter their name…" onkeydown="if(event.key==='Enter') addFriend()">
      <button class="add-btn" onclick="addFriend()">Add</button>
    </div>
  </div>

  <div class="list-header">
    <div class="section-label">Rankings</div>
    <span class="count-badge" id="count-badge">0 friends</span>
  </div>

  <div class="friend-list" id="friend-list"></div>
  <div class="empty-state" id="empty-state">
    <span class="emoji">✦</span>
    <p>No friends added yet.<br>Add someone above to begin your ranking.</p>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-hero">
      <span class="modal-rank-label" id="modal-rank-label">Rank #1</span>
      <div class="modal-avatar-wrap">
        <div class="modal-avatar" id="modal-avatar" onclick="document.getElementById('modal-photo-input').click()"></div>
        <div class="modal-avatar-hint">✎</div>
        <input type="file" id="modal-photo-input" accept="image/*" onchange="handleModalPhoto(event)">
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-name-row">
        <input class="modal-name-input" id="modal-name" type="text" placeholder="Name…" />
        <div class="modal-rank-badge" id="modal-rank-badge"></div>
      </div>
      <span class="desc-label">Description</span>
      <textarea class="desc-textarea" id="modal-desc" placeholder="What makes this person special? A memory, a vibe, anything…" rows="4"></textarea>
      <div class="modal-footer">
        <button class="btn-save" onclick="saveModal()">Save Changes</button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
  let friends = JSON.parse(localStorage.getItem('fr_v2') || '[]');
  let pendingPhoto = null;
  let dragSrc = null;
  let editingId = null;
  let modalPendingPhoto = null;

  function handlePhoto(e) {
    const file = e.target.files[0]; if (!file) return;
    readFile(file, data => {
      pendingPhoto = data;
      const el = document.getElementById('avatar-preview');
      el.innerHTML = `<img src="${data}" alt="">`;
    });
  }

  function handleModalPhoto(e) {
    const file = e.target.files[0]; if (!file) return;
    readFile(file, data => {
      modalPendingPhoto = data;
      renderModalAvatar(data, document.getElementById('modal-name').value);
    });
  }

  function readFile(file, cb) {
    const r = new FileReader();
    r.onload = ev => cb(ev.target.result);
    r.readAsDataURL(file);
  }

  function addFriend() {
    const input = document.getElementById('name-input');
    const name = input.value.trim(); if (!name) return;
    friends.push({ id: Date.now(), name, photo: pendingPhoto, desc: '' });
    save(); render();
    input.value = ''; pendingPhoto = null;
    document.getElementById('avatar-preview').innerHTML = '📷';
    document.getElementById('photo-input').value = '';
  }

  function deleteFriend(id, e) {
    e.stopPropagation();
    friends = friends.filter(f => f.id !== id);
    save(); render();
  }

  function openModal(id) {
    const f = friends.find(x => x.id === id); if (!f) return;
    editingId = id; modalPendingPhoto = null;
    const rank = friends.indexOf(f) + 1;
    document.getElementById('modal-rank-label').textContent = `Rank #${rank}`;
    document.getElementById('modal-name').value = f.name;
    document.getElementById('modal-desc').value = f.desc || '';
    renderModalAvatar(f.photo, f.name);
    renderModalBadge(rank);
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('modal-desc').focus(), 300);
  }

  function renderModalAvatar(photo, name) {
    const el = document.getElementById('modal-avatar');
    el.innerHTML = photo ? `<img src="${photo}" alt="">` : getInitials(name || '?');
  }

  function renderModalBadge(rank) {
    const el = document.getElementById('modal-rank-badge');
    el.className = 'modal-rank-badge ' + getRankClass(rank - 1);
    el.textContent = rank;
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editingId = null; modalPendingPhoto = null;
  }

  function saveModal() {
    if (!editingId) return;
    const f = friends.find(x => x.id === editingId); if (!f) return;
    const newName = document.getElementById('modal-name').value.trim();
    if (newName) f.name = newName;
    f.desc = document.getElementById('modal-desc').value.trim();
    if (modalPendingPhoto) f.photo = modalPendingPhoto;
    save(); render(); closeModal();
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function getRankClass(i) {
    if (i === 0) return 'rank-1';
    if (i === 1) return 'rank-2';
    if (i === 2) return 'rank-3';
    return 'rank-other';
  }

  function avatarHTML(f) {
    return f.photo ? `<img src="${f.photo}" alt="${f.name}">` : getInitials(f.name);
  }

  function render() {
    const list = document.getElementById('friend-list');
    const empty = document.getElementById('empty-state');
    const badge = document.getElementById('count-badge');
    badge.textContent = friends.length === 1 ? '1 friend' : `${friends.length} friends`;

    if (friends.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    list.innerHTML = friends.map((f, i) => `
      <div class="friend-card" draggable="true" data-id="${f.id}"
        ondragstart="onDragStart(event,${f.id})"
        ondragover="onDragOver(event)"
        ondragenter="onDragEnter(event)"
        ondragleave="onDragLeave(event)"
        ondrop="onDrop(event,${f.id})"
        ondragend="onDragEnd(event)"
        style="animation: cardIn 0.3s ease ${i * 0.04}s both">
        <div class="rank-badge ${getRankClass(i)}">${i + 1}</div>
        <div class="friend-avatar" onclick="openModal(${f.id})">${avatarHTML(f)}</div>
        <div class="friend-info" onclick="openModal(${f.id})">
          <div class="friend-name">${f.name}</div>
          <div class="friend-desc-preview">${f.desc || 'Tap to add a description…'}</div>
        </div>
        <div class="drag-handle"><span></span><span></span><span></span></div>
        <button class="delete-btn" onclick="deleteFriend(${f.id}, event)" title="Remove">✕</button>
      </div>
    `).join('');
  }

  function onDragStart(e, id) { dragSrc = id; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
  function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
  function onDragEnter(e) { e.currentTarget.classList.add('drag-over'); }
  function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
  function onDrop(e, targetId) {
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    if (dragSrc === targetId) return;
    const si = friends.findIndex(f => f.id === dragSrc);
    const ti = friends.findIndex(f => f.id === targetId);
    const [moved] = friends.splice(si, 1);
    friends.splice(ti, 0, moved);
    save(); render();
  }
  function onDragEnd() { document.querySelectorAll('.friend-card').forEach(c => c.classList.remove('dragging','drag-over')); }

  function save() { localStorage.setItem('fr_v2', JSON.stringify(friends)); }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) saveModal();
  });

  render();
</script>
</body>
</html>
